    <body>
        <h1>Parágrafos e Quebras de Linha</h1>
        <hr>
        <p>Aqui vêm um monte de inutilidades
            e besteiras todas
            escritas de forma completamente aleatória.<br> Só pra 
            depois usar a tag &lt;br&gt; e poder 
            demonstrar a quebra de linha.
            <!--&lt e &gt signifiacm less than e greater than, servem para mostrar os sinais de maior que > ou menor que < no site sem que dentro do código seja aberto uma tag -->
        </p>
        <p>Adicionaremos agora alguns símbolos especiais:<br>
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &Delta;
        &uparrow;
        </p>
        <p>Agora emojis:<br>
        🫵&#x1FAF5;🤑&#x1F911;
        
        </p>
